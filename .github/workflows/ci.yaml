name: CI

on:
    push:
    pull_request:

jobs:
    run-tests:
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, windows-latest]
                python_version:
                    - "3.10"
                    - "3.11"
                    - "3.12"
        name: Test
        runs-on: ${{ matrix.os }}

        steps:
            - name: Checkout Code
              uses: actions/checkout@v3

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                python-version: ${{ matrix.python_version }}

            - name: Install Dependencies
              run: python -m pip install pytest

            - name: Run Tests
              run: pytest